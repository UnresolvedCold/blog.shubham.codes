backend:
  name: github
  repo: UnresolvedCold/blog.shubham.codes
  branch: main
  # Firebase Hosting can serve the CMS UI, but GitHub auth needs an OAuth proxy.
  # Set this to your deployed proxy URL before using the CMS in production.
  base_url: https://your-oauth-proxy.example.com

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "src/content/posts"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Title", name: "meta_title", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Categories", name: "categories", widget: "list", default: ["others"] }
      - { label: "Authors", name: "authors", widget: "list", default: ["Shubham Kumar"] }
      - { label: "Tags", name: "tags", widget: "list", default: ["others"] }
      - { label: "Draft", name: "draft", widget: "boolean", default: true, required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: 'To size body images, add a Markdown title: ![Alt](/images/uploads/file.jpg "small center"). Sizes: small, medium, large. Alignment: left, center, right.'

  - name: "authors"
    label: "Authors"
    label_singular: "Author"
    folder: "src/content/authors"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Meta Title", name: "meta_title", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Social"
        name: "social"
        widget: "object"
        required: false
        fields:
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "X", name: "x", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "Website", name: "website", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    preview_path: "page/{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Title", name: "meta_title", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Layout", name: "layout", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "site_sections"
    label: "Site Sections"
    files:
      - label: "Contact"
        name: "contact"
        file: "src/content/contact/-index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Meta Title", name: "meta_title", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Body", name: "body", widget: "markdown" }
